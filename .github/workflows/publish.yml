name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Configure npm auth
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm config set --location=user "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @localloop/shared-types
        working-directory: packages/shared-types
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "::notice::$PACKAGE_NAME@$LOCAL_VERSION already published — skipping."
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $REMOTE_VERSION)…"
            npm publish --provenance --access public
          fi

      - name: Publish @localloop/geo-utils
        working-directory: packages/geo-utils
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "::notice::$PACKAGE_NAME@$LOCAL_VERSION already published — skipping."
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $REMOTE_VERSION)…"
            npm publish --provenance --access public
          fi
