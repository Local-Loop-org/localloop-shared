name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish @localloop/shared-types
        working-directory: packages/shared-types
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @localloop/shared-types version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "@localloop/shared-types@$CURRENT already published, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @localloop/geo-utils
        working-directory: packages/geo-utils
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @localloop/geo-utils version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "@localloop/geo-utils@$CURRENT already published, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
