name: Publish

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      # Auth: GitHub OIDC + npm Trusted Publishers. No NPM_TOKEN needed —
      # npm verifies the OIDC token against the Trusted Publisher config
      # registered on each package's Settings page (publisher = GitHub
      # Actions, repo = Local-Loop-org/localloop-shared, workflow =
      # publish.yml). Requires `permissions.id-token: write` above.

      - name: Publish @localloop/shared-types
        working-directory: packages/shared-types
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "::notice::$PACKAGE_NAME@$LOCAL_VERSION already published — skipping."
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $REMOTE_VERSION)…"
            npm publish --provenance --access public
          fi

      - name: Publish @localloop/geo-utils
        working-directory: packages/geo-utils
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "::notice::$PACKAGE_NAME@$LOCAL_VERSION already published — skipping."
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $REMOTE_VERSION)…"
            npm publish --provenance --access public
          fi
